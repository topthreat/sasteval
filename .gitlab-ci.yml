# sasteval — GitLab SAST and Dependency Scanning
#
# This file activates GitLab's built-in SAST and Dependency Scanning for the
# sasteval benchmark repository. No build step or local tooling is required.
#
# GitLab SAST will scan:
#   - java/src/ using Semgrep (and GitLab Advanced SAST on Ultimate tier)
#   - dotnet/ using Semgrep (and GitLab Advanced SAST on Ultimate tier)
#
# Dependency Scanning will scan:
#   - java/pom.xml    for vulnerable Maven dependencies
#   - dotnet/SastEval.csproj  for vulnerable NuGet dependencies

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml
